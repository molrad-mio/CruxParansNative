name: CruxParans
options:
  bundleIdPrefix: com.alpheratzlab
  developmentLanguage: en

packages:
  Firebase:
    url: https://github.com/firebase/firebase-ios-sdk
    from: 10.27.0

targets:
  CruxParansPro:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Sources/CruxParansPro
      - path: Sources/Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.alpheratzlab.cruxparanspro
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_ITSAppUsesNonExemptEncryption: NO
        INFOPLIST_KEY_UISupportedInterfaceOrientations: UIInterfaceOrientationPortrait UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight
        MARKETING_VERSION: 1.0.0
        CURRENT_PROJECT_VERSION: 28
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        SWIFT_VERSION: 5.0
        DEVELOPMENT_TEAM: GP463A2ZM2
        SWIFT_OBJC_BRIDGING_HEADER: Sources/Shared/Sweph/SwephWrapper-Bridging-Header.h
        HEADER_SEARCH_PATHS: "$(inherited) Sources/Shared/Sweph/src"
    dependencies:
      - package: Firebase
        product: FirebaseCrashlytics

  CruxParans:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Sources/CruxParans
      - path: Sources/Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.molrad.crux
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_ITSAppUsesNonExemptEncryption: NO
        INFOPLIST_KEY_UISupportedInterfaceOrientations: UIInterfaceOrientationPortrait UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight
        MARKETING_VERSION: 1.0.0
        CURRENT_PROJECT_VERSION: 28
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        SWIFT_VERSION: 5.0
        DEVELOPMENT_TEAM: GP463A2ZM2
        SWIFT_OBJC_BRIDGING_HEADER: Sources/Shared/Sweph/SwephWrapper-Bridging-Header.h
        HEADER_SEARCH_PATHS: "$(inherited) Sources/Shared/Sweph/src"
    dependencies:
      - package: Firebase
        product: FirebaseCrashlytics
