workflows:
  ios-native-release:
    name: iOS Native Release Build
    instance_type: mac_mini_m1
    integrations:
      app_store_connect: Codemagic
    environment:
      vars:
        BUILD_TYPE: "TEST"
    scripts:
      - name: Install XcodeGen
        script: |
          brew install xcodegen
      - name: Generate Xcode Project
        script: |
          xcodegen generate
      - name: Build Pro Edition
        script: |
          xcodebuild build -project CruxParans.xcodeproj -scheme CruxParansPro -destination "generic/platform=iOS" CODE_SIGN_IDENTITY="" CODE_SIGNING_REQUIRED=NO
      - name: Build Light Edition
        script: |
          xcodebuild build -project CruxParans.xcodeproj -scheme CruxParansLight -destination "generic/platform=iOS" CODE_SIGN_IDENTITY="" CODE_SIGNING_REQUIRED=NO
    artifacts:
      - build/ios/ipa/*.ipa
